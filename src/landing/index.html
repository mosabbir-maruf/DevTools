<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Primary Meta -->
    <title>DevTools — Screenshot, Fonts, Colors & Meta Inspector for Chrome</title>
    <meta
      name="description"
      content="Free, open-source Chrome extension and all-in-one developer toolkit: capture full-page screenshots, inspect fonts on hover, pick colors with the eyedropper, and audit SEO metadata. 100% local, zero tracking."
    />
    <meta
      name="keywords"
      content="chrome extension, full page screenshot, screenshot tool, font inspector, css font detector, color picker, eyedropper, meta inspector, seo checker, open graph checker, developer tools, web precision, privacy, offline"
    />
    <meta name="author" content="Mosabbir Maruf" />
    <meta name="robots" content="index, follow" />
    <meta name="application-name" content="DevTools" />
    <link rel="canonical" href="https://devtools-ext.vercel.app/" />
    <link rel="icon" type="image/svg+xml" href="/assets/icon.svg" />
    <link rel="apple-touch-icon" href="/assets/icon128.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="DevTools" />
    <meta property="og:url" content="https://devtools-ext.vercel.app/" />
    <meta property="og:title" content="DevTools — Screenshot, Fonts, Colors & Meta Inspector for Chrome" />
    <meta
      property="og:description"
      content="Free, open-source Chrome extension: capture full-page screenshots, inspect fonts on hover, pick colors, and audit SEO metadata. 100% local, zero tracking."
    />
    <meta property="og:image" content="https://devtools-ext.vercel.app/meta-og.png" />
    <meta property="og:image:secure_url" content="https://devtools-ext.vercel.app/meta-og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="DevTools — a developer toolkit for web precision, shown as an extension popup with screenshot, font, color, and meta tools." />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DevTools — Screenshot, Fonts, Colors & Meta Inspector for Chrome" />
    <meta
      name="twitter:description"
      content="Free, open-source Chrome extension: screenshots, font inspector, color picker, and SEO meta inspector. 100% local, zero tracking."
    />
    <meta name="twitter:image" content="https://devtools-ext.vercel.app/meta-og.png" />
    <meta name="twitter:image:alt" content="DevTools developer toolkit extension popup preview." />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "DevTools — Screenshot, Fonts & Colors",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Chrome",
        "url": "https://devtools-ext.vercel.app/",
        "image": "https://devtools-ext.vercel.app/meta-og.png",
        "description": "Free, open-source Chrome extension and all-in-one developer toolkit: capture full-page screenshots, inspect fonts on hover, pick colors with the eyedropper, and audit SEO metadata. 100% local, zero tracking.",
        "softwareVersion": "2.0.0",
        "license": "https://opensource.org/licenses/MIT",
        "isAccessibleForFree": true,
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "author": {
          "@type": "Person",
          "name": "Mosabbir Maruf",
          "url": "https://github.com/mosabbir-maruf"
        }
      }
    </script>
    <script>
      // Apply saved theme before paint to avoid a flash of the wrong theme.
      (function () {
        try {
          if (localStorage.getItem('devtools-theme') === 'light') {
            document.documentElement.classList.add('theme-light');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="landing-mode">
    <div id="root"></div>
    <script type="module" src="./Landing.tsx"></script>
  </body>
</html>
